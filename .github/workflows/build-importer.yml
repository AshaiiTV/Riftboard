name: Build NXT5 Importer

on:
  push:
    branches: [main]
    paths:
      - "importer-app/**"
      - ".github/workflows/build-importer.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows app
    runs-on: windows-latest
    defaults:
      run:
        working-directory: importer-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows app
        run: npm run dist:win

      - name: Upload Windows app
        uses: actions/upload-artifact@v4
        with:
          name: NXT5-Importer-Windows
          path: importer-app/release/*.exe

      - name: Publish latest exporter release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nxt5-match-exporter-latest
          name: NXT5 Importer latest
          body: "Dernière version de NXT5 Importer."
          make_latest: true
          overwrite_files: true
          files: importer-app/release/*.exe

  build-mac:
    name: macOS app
    runs-on: macos-latest
    defaults:
      run:
        working-directory: importer-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build mac app
        run: |
          npm run dist:mac
          npm run dist:mac:arm

      - name: Repack mac apps with opener
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          make_zip() {
            ARCH="$1"
            APP_DIR="release/mac"
            if [ "$ARCH" = "arm64" ]; then
              APP_DIR="release/mac-arm64"
            fi
            APP_PATH="$APP_DIR/NXT5 Importer.app"
            BUNDLE_DIR="release/NXT5 Importer Mac ${ARCH}"
            rm -rf "$BUNDLE_DIR"
            mkdir -p "$BUNDLE_DIR"
            cp -R "$APP_PATH" "$BUNDLE_DIR/"
            printf '%s\n' \
              '#!/bin/bash' \
              'set -e' \
              'DIR="$(cd "$(dirname "$0")" && pwd)"' \
              'APP="$DIR/NXT5 Importer.app"' \
              'xattr -dr com.apple.quarantine "$APP" 2>/dev/null || true' \
              'open "$APP"' \
              > "$BUNDLE_DIR/Ouvrir NXT5 Importer.command"
            chmod +x "$BUNDLE_DIR/Ouvrir NXT5 Importer.command"
            rm -f "release/NXT5-Importer-Mac-${ARCH}-${VERSION}.zip"
            ditto -c -k --sequesterRsrc --keepParent "$BUNDLE_DIR" "release/NXT5-Importer-Mac-${ARCH}-${VERSION}.zip"
          }
          make_zip x64
          make_zip arm64

      - name: Upload mac app
        uses: actions/upload-artifact@v4
        with:
          name: NXT5-Importer-macOS
          path: importer-app/release/*.zip

      - name: Publish latest exporter release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nxt5-match-exporter-latest
          name: NXT5 Importer latest
          body: "Dernière version de NXT5 Importer."
          make_latest: true
          overwrite_files: true
          files: importer-app/release/*.zip
