<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NXT5 Importer</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div class="brand-card">
        <img src="../assets/nxt5-logo.png" alt="NXT5" />
      </div>
      <div class="hero-copy">
        <p class="eyebrow">NXT5 Match Export</p>
        <h1>Importer une game LoL</h1>
        <p class="lead">Colle l'ID numerique donne par League of Legends, choisis la region, puis genere un JSON complet pret pour NXT5.</p>
        <div class="chips"><span>No key</span><span>Full JSON</span><span>Match-V5</span></div>
      </div>
    </section>

    <form id="form" class="panel">
      <div class="game-grid">
        <label>
          <span>Game ID</span>
          <input id="gameId" name="gameId" placeholder="7861632138, EUW1_7861632138 ou code copié du client LoL" autocomplete="off" required />
        </label>
        <label>
          <span>Region</span>
          <select id="platform" name="platform">
            <option value="EUW1">EUW</option>
            <option value="EUN1">EUNE</option>
            <option value="NA1">NA</option>
            <option value="KR">KR</option>
          </select>
        </label>
      </div>

      <div class="grid">
        <label>
          <span>Nom de l'import</span>
          <input id="label" name="label" placeholder="Game 3, Scrim vs..." autocomplete="off" />
        </label>
        <label>
          <span>Adversaire</span>
          <input id="opponent" name="opponent" placeholder="Equipe adverse" autocomplete="off" />
        </label>
      </div>

      <button id="submit" type="submit">Generer le JSON complet</button>
      <p class="hint">Ensuite : NXT5 -> Integration -> Importer un fichier NXT5 local.</p>
    </form>

    <div id="status" class="status" hidden></div>
  </main>

  <script src="./renderer.js"></script>
</body>
</html>
